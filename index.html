<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pec - ProtectEarth Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class', 
        }
    </script>
</head>
<body class="bg-white text-gray-900 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="text-xl font-bold text-green-600">PEC</div>
            
            <div class="flex items-center space-x-6">
                <a href="#home" class="hover:text-green-500">Home</a>
                <a href="#services" class="hover:text-green-500">Services</a>
                <a href="#team" class="hover:text-green-500">Team</a>
                
                <button id="mode-toggle" class="p-2 rounded-full bg-gray-100 dark:bg-slate-800">
                    <i id="mode-icon" class="fas fa-moon text-gray-600 dark:text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <section id="home" class="py-20 text-center">
        <h1 class="text-4xl font-bold mb-4">Protect The Earth</h1>
        <p class="text-gray-600 dark:text-gray-400">Your sustainable partner.</p>
    </section>

    <script>
   
        const btn = document.getElementById('mode-toggle');
        const icon = document.getElementById('mode-icon');
        const html = document.documentElement;

        btn.addEventListener('click', () => {
            html.classList.toggle('dark');
            
            if (html.classList.contains('dark')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.theme = 'dark';
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.theme = 'light';
            }
        });

      
        if (localStorage.theme === 'dark') {
            html.classList.add('dark');
            icon.classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>
